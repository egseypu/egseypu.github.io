<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>我的个人网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->

                <h3>待办应用</h3>

                <p>UI 设计练习集合</p>
            </div>
        </div>
    </section>

    <!-- 联系方式 -->
    <section id="contact" class="contact">
        <h2>联系我</h2>
        <p>邮箱：hello@example.com</p>
        <div class="social">
            <a href="#">GitHub</a>
            <a href="#">微信</a>
            <a href="#">邮箱</a>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2024 我的个人网站. All rights reserved.</p>
    </footer>
